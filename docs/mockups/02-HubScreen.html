<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>02 — Hub Screen (Polished)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Instrument+Serif:ital@1&family=JetBrains+Mono:wght@400;700&family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>

/* ── Reset ── */
* { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Shared elevation / glass patterns ── */
:root {
  --card-shadow:
    inset 0 1px 0 rgba(255,255,255,0.055),
    0 2px 8px  rgba(0,0,0,0.55),
    0 8px 28px rgba(0,0,0,0.35);
  --card-shadow-raised:
    inset 0 1px 0 rgba(255,255,255,0.07),
    0 4px 16px rgba(0,0,0,0.6),
    0 16px 48px rgba(0,0,0,0.4);
  --team: #1B6EC2;   /* Harlequins — set inline per team in real impl */
}

#hub {
  display: flex;
  flex-direction: column;
  min-height: 844px;
  background: var(--rm-bg);
  /* Subtle team-colour atmospheric wash from top */
  background-image:
    radial-gradient(ellipse 110% 42% at 50% 0%,
      color-mix(in oklch, var(--team) 16%, transparent) 0%,
      transparent 70%);
  position: relative;
  overflow: hidden;
}

/* Very faint pitch-stripe texture */
#hub::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    180deg,
    transparent 0, transparent 28px,
    color-mix(in oklch, var(--rm-pitch-soft) 30%, transparent) 28px,
    color-mix(in oklch, var(--rm-pitch-soft) 30%, transparent) 29px
  );
  pointer-events: none;
  opacity: 0.25;
}

/* ── Topbar ── */
#hub-topbar {
  position: relative;
  z-index: 1;
  display: flex;
  justify-content: flex-end;
  padding: 14px 16px 0;
}

.icon-btn {
  background: none; border: none;
  color: var(--rm-text-dim); cursor: pointer;
  padding: 8px; line-height: 0;
  border-radius: 10px;
  transition: color 0.12s, background 0.12s;
}
.icon-btn:active { background: var(--rm-surface-2); color: var(--rm-text); }

/* ── Hero ── */
#hub-hero {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 14px 20px 16px;
}

/* Crest with team colour outer glow */
.hub-crest {
  width: 76px; height: 76px;
  border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--rm-font-display);
  font-size: 36px;
  color: rgba(255,255,255,0.95);
  position: relative; overflow: hidden;
  flex-shrink: 0;
  /* Multi-layer shadow: team colour glow + depth */
  box-shadow:
    0 0 0 1.5px color-mix(in oklch, var(--team) 40%, transparent),
    0 0 32px   color-mix(in oklch, var(--team) 45%, transparent),
    0 8px 32px rgba(0,0,0,0.55),
    inset 0 1px 0 rgba(255,255,255,0.22);
  background: linear-gradient(160deg, var(--team) 0%,
    color-mix(in oklch, var(--team) 55%, black) 100%);
  margin-bottom: 4px;
}
.hub-crest::after {
  content: ''; position: absolute; inset: 0;
  border-radius: inherit;
  background: linear-gradient(180deg, rgba(255,255,255,0.10) 0%, transparent 45%, rgba(0,0,0,0.22) 100%);
}
.hub-crest span { position: relative; z-index: 1; }

#hub-team-name {
  font-family: var(--rm-font-display);
  font-size: 30px; font-weight: 400;
  color: var(--rm-chalk);
  text-transform: uppercase;
  letter-spacing: 0.05em; line-height: 1;
}

/* IMPROVED: Standing as bold data row */
#hub-standing {
  display: flex;
  align-items: center;
  gap: 0;
  margin-top: 2px;
}

.hub-standing-item {
  display: flex; flex-direction: column;
  align-items: center; gap: 2px;
  padding: 0 14px;
  border-right: 1px solid var(--rm-hairline);
}
.hub-standing-item:last-child { border-right: none; }

.hub-standing-val {
  font-family: var(--rm-font-display);
  font-size: 28px; line-height: 1;
  color: var(--team);
  /* Glow on key standing number */
  text-shadow: 0 0 20px color-mix(in oklch, var(--team) 55%, transparent);
}

.hub-standing-val--chalk {
  color: var(--rm-chalk);
  text-shadow: none;
}

.hub-standing-label {
  font-family: var(--rm-font-mono);
  font-size: 8px; letter-spacing: 0.16em;
  color: var(--rm-text-dim);
  text-transform: uppercase;
}

/* Season + progress */
#hub-meta {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  width: 100%;
}

#hub-eyebrow {
  font-family: var(--rm-font-mono);
  font-size: 10px; letter-spacing: 0.16em;
  color: var(--rm-pitch);
  text-transform: uppercase;
}

/* IMPROVED: Progress bar with gradient fill */
#hub-progress {
  width: 180px; height: 3px;
  background: var(--rm-surface-2);
  border-radius: 2px; overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,0.4);
}
#hub-progress-fill {
  height: 100%;
  width: 36%;
  background: linear-gradient(90deg, var(--rm-pitch-deep), var(--rm-pitch));
  border-radius: 2px;
  box-shadow: 0 0 8px color-mix(in oklch, var(--rm-pitch) 60%, transparent);
}

/* ── Next match card ── */
#hub-next-match {
  position: relative; z-index: 1;
  margin: 2px 16px 10px;
  padding: 14px 16px;
  background: var(--rm-surface);
  border: 1px solid var(--rm-border-soft);
  border-radius: 14px;
  display: flex; flex-direction: column; gap: 10px;
  box-shadow: var(--card-shadow);
}

/* Inner top highlight */
#hub-next-match::before {
  content: '';
  position: absolute; top: 0; left: 16px; right: 16px;
  height: 1px;
  background: linear-gradient(90deg,
    transparent,
    rgba(255,255,255,0.08) 30%,
    rgba(255,255,255,0.08) 70%,
    transparent);
  border-radius: 1px;
}

.hub-nm-label {
  font-family: var(--rm-font-mono);
  font-size: 10px; letter-spacing: 0.16em;
  color: var(--rm-pitch); text-transform: uppercase; text-align: center;
  font-weight: 700;
}

.hub-nm-fixture {
  display: flex; align-items: center; justify-content: center; gap: 10px;
}

.hub-nm-side { display: flex; align-items: center; gap: 8px; }
.hub-nm-side--away { flex-direction: row-reverse; }

/* Bigger crests in fixture card */
.nm-crest {
  width: 40px; height: 40px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--rm-font-display); font-size: 18px;
  color: rgba(255,255,255,0.92);
  position: relative; overflow: hidden; flex-shrink: 0;
}
.nm-crest::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.10) 0%, transparent 50%, rgba(0,0,0,0.20) 100%);
}
.nm-crest span { position: relative; z-index: 1; }

.hub-nm-name {
  font-family: var(--rm-font-mono); font-size: 14px;
  font-weight: 700; letter-spacing: 0.10em;
  color: var(--rm-text); text-transform: uppercase;
}
.hub-nm-side--me .hub-nm-name { color: var(--rm-chalk); }

.hub-nm-vs {
  font-family: var(--rm-font-editor); font-style: italic;
  font-size: 14px; color: var(--rm-text-dim); flex-shrink: 0;
}

.hub-nm-meta {
  font-family: var(--rm-font-mono); font-size: 10px;
  letter-spacing: 0.12em; color: var(--rm-text-muted);
  text-transform: uppercase; text-align: center;
}

/* Spread line */
#hub-nm-spread {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  font-family: var(--rm-font-mono); font-size: 10px;
  letter-spacing: 0.10em; text-transform: uppercase;
  color: var(--rm-stat-4);
  padding-top: 6px;
  border-top: 1px solid var(--rm-hairline);
}

/* ── Tile grid ── */
#hub-grid {
  position: relative; z-index: 1;
  flex: 1; padding: 0 16px 10px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  align-content: start;
}

.hub-tile {
  background: var(--rm-surface);
  border: 1px solid var(--rm-border-soft);
  border-radius: 13px;
  padding: 18px 12px;
  min-height: 92px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; cursor: pointer;
  color: var(--rm-pitch);
  position: relative;
  transition: background 0.14s, border-color 0.14s, box-shadow 0.14s;
  box-shadow: var(--card-shadow);
}

/* Inner top highlight on tiles */
.hub-tile::before {
  content: '';
  position: absolute; top: 0; left: 12px; right: 12px;
  height: 1px;
  background: linear-gradient(90deg,
    transparent,
    rgba(255,255,255,0.07) 30%,
    rgba(255,255,255,0.07) 70%,
    transparent);
}

.hub-tile svg { width: 26px; height: 26px; flex-shrink: 0; }

.hub-tile-label {
  font-family: var(--rm-font-body);
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--rm-chalk);
}

.hub-tile:active {
  background: var(--rm-surface-2);
  border-color: color-mix(in oklch, var(--rm-pitch) 40%, transparent);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.04),
    0 2px 8px rgba(0,0,0,0.5),
    0 0 16px color-mix(in oklch, var(--rm-pitch) 14%, transparent);
}

/* IMPROVED: Stub tiles dimmed with "Soon" badge */
.hub-tile--stub {
  opacity: 0.32; cursor: default; pointer-events: none;
  box-shadow: 0 1px 4px rgba(0,0,0,0.3);
}
.hub-tile--stub::before { display: none; }

.hub-tile-soon {
  position: absolute; top: 8px; right: 8px;
  font-family: var(--rm-font-mono); font-size: 7px;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--rm-text-dim);
  background: var(--rm-surface-2);
  border: 1px solid var(--rm-border-soft);
  border-radius: 4px; padding: 1px 6px;
}

/* ── Footer ── */
#hub-footer {
  position: relative; z-index: 1;
  padding: 14px 16px 32px;
  border-top: 1px solid var(--rm-border-soft);
  background: linear-gradient(180deg,
    transparent 0%,
    color-mix(in oklch, var(--rm-bg-deep) 60%, transparent) 100%);
}

/* IMPROVED: CTA with animated pulse glow */
#hub-play-next {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 16px;
  background: #007a2a; border: none;
  border-radius: 14px; color: #fff;
  font-family: var(--rm-font-body); font-size: 15px;
  font-weight: 700; letter-spacing: 0.06em;
  text-transform: uppercase; cursor: pointer;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.25),
    0 4px 16px color-mix(in oklch, var(--rm-pitch) 30%, transparent),
    0 8px 32px rgba(0,0,0,0.4);
  animation: ctaPulse 2.4s ease-in-out infinite;
}

@keyframes ctaPulse {
  0%, 100% {
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.25),
      0 4px 16px color-mix(in oklch, var(--rm-pitch) 28%, transparent),
      0 8px 32px rgba(0,0,0,0.4);
  }
  50% {
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.25),
      0 4px 24px color-mix(in oklch, var(--rm-pitch) 55%, transparent),
      0 8px 40px rgba(0,0,0,0.35),
      0 0 0 5px color-mix(in oklch, var(--rm-pitch) 10%, transparent);
  }
}

#hub-play-next:active { background: #006622; animation: none; }
</style>
</head>
<body>
<div class="frame-label">
  <span class="frame-label-name">Hub Screen</span>
  <span class="frame-label-badge">v2 — Polished</span>
</div>

<div class="frame">
  <div id="hub">

    <div id="hub-topbar">
      <button class="icon-btn" aria-label="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>

    <!-- Hero -->
    <div id="hub-hero">
      <div class="hub-crest"><span>H</span></div>

      <div id="hub-team-name">Harlequins</div>

      <!-- Standing: three big-number stats -->
      <div id="hub-standing">
        <div class="hub-standing-item">
          <span class="hub-standing-val">3rd</span>
          <span class="hub-standing-label">Position</span>
        </div>
        <div class="hub-standing-item">
          <span class="hub-standing-val hub-standing-val--chalk">28</span>
          <span class="hub-standing-label">Points</span>
        </div>
        <div class="hub-standing-item">
          <span class="hub-standing-val hub-standing-val--chalk" style="font-size:20px;line-height:1.3">6W–2L</span>
          <span class="hub-standing-label">Record</span>
        </div>
      </div>

      <div id="hub-meta">
        <div id="hub-eyebrow">2025/26 · Week 8 of 22</div>
        <div id="hub-progress">
          <div id="hub-progress-fill"></div>
        </div>
      </div>
    </div>

    <!-- Next match -->
    <div id="hub-next-match">
      <div class="hub-nm-label">Next · Round 9 · 15 Nov</div>
      <div class="hub-nm-fixture">
        <div class="hub-nm-side hub-nm-side--me">
          <div class="nm-crest"
               style="background:linear-gradient(160deg,#1B6EC2 0%,#0c3a7a 100%);
                      box-shadow:0 0 14px color-mix(in oklch,#1B6EC2 40%,transparent),inset 0 1px 0 rgba(255,255,255,0.18)">
            <span>H</span>
          </div>
          <span class="hub-nm-name">HAR</span>
        </div>
        <span class="hub-nm-vs">vs</span>
        <div class="hub-nm-side hub-nm-side--away">
          <span class="hub-nm-name">NOR</span>
          <div class="nm-crest"
               style="background:linear-gradient(160deg,#006C4E 0%,#003828 100%);
                      box-shadow:0 0 14px color-mix(in oklch,#006C4E 40%,transparent),inset 0 1px 0 rgba(255,255,255,0.12)">
            <span>N</span>
          </div>
        </div>
      </div>
      <div class="hub-nm-meta">Home · Twickenham Stoop</div>
      <div id="hub-nm-spread">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M2.25 12c0-5.385 4.365-9.75 9.75-9.75s9.75 4.365 9.75 9.75-4.365 9.75-9.75 9.75S2.25 17.385 2.25 12zm13.36-1.814a.75.75 0 1 0-1.22-.872l-3.236 4.53L9.53 12.22a.75.75 0 0 0-1.06 1.06l2.25 2.25a.75.75 0 0 0 1.14-.094l3.75-5.25z" clip-rule="evenodd"/></svg>
        Harlequins favoured · 5 pts
      </div>
    </div>

    <!-- Tiles -->
    <div id="hub-grid">
      <button class="hub-tile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" pointer-events="none" aria-hidden="true"><path d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z"/></svg>
        <span class="hub-tile-label">Squad</span>
      </button>
      <button class="hub-tile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" pointer-events="none" aria-hidden="true"><path d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5"/></svg>
        <span class="hub-tile-label">Fixtures</span>
      </button>
      <button class="hub-tile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" pointer-events="none" aria-hidden="true"><path d="M16.5 18.75h-9m9 0a3 3 0 013 3h-15a3 3 0 013-3m9 0v-3.375c0-.621-.503-1.125-1.125-1.125h-.871M7.5 18.75v-3.375c0-.621.504-1.125 1.125-1.125h.872m5.007 0H9.497m5.007 0a7.454 7.454 0 01-.982-3.172M9.497 14.25a7.454 7.454 0 00.981-3.172M5.25 4.236c-.982.143-1.954.317-2.916.52A6.003 6.003 0 007.73 9.728M5.25 4.236V4.5c0 2.108.966 3.99 2.48 5.228M5.25 4.236V2.721C7.456 2.41 9.71 2.25 12 2.25c2.291 0 4.545.16 6.75.47v1.516M7.73 9.728a6.726 6.726 0 002.748 1.35m8.272-6.842V4.5c0 2.108-.966 3.99-2.48 5.228m2.48-5.492a46.32 46.32 0 012.916.52 6.003 6.003 0 01-5.395 4.972m0 0a6.726 6.726 0 01-2.749 1.35m0 0a6.772 6.772 0 01-3.044 0"/></svg>
        <span class="hub-tile-label">League</span>
      </button>
      <button class="hub-tile hub-tile--stub" disabled>
        <span class="hub-tile-soon">Soon</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" pointer-events="none" aria-hidden="true"><path d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z"/></svg>
        <span class="hub-tile-label">Training</span>
      </button>
      <button class="hub-tile hub-tile--stub" disabled>
        <span class="hub-tile-soon">Soon</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" pointer-events="none" aria-hidden="true"><path d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
        <span class="hub-tile-label">Contracts</span>
      </button>
      <button class="hub-tile hub-tile--stub" disabled>
        <span class="hub-tile-soon">Soon</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" pointer-events="none" aria-hidden="true"><path d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5"/></svg>
        <span class="hub-tile-label">Transfers</span>
      </button>
    </div>

    <!-- Footer CTA -->
    <div id="hub-footer">
      <button id="hub-play-next">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" pointer-events="none"><path fill-rule="evenodd" d="M4.5 5.653c0-1.426 1.529-2.33 2.779-1.643l11.54 6.348c1.295.712 1.295 2.573 0 3.285L7.28 19.991c-1.25.687-2.779-.217-2.779-1.643V5.653z" clip-rule="evenodd"/></svg>
        Go to Next Match
      </button>
    </div>

  </div>
</div>
</body>
</html>
