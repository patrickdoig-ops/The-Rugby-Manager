<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Rugby Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
</head>
<body>
  <script>
    // Apply saved theme class before first paint to avoid flash
    (function(){
      if(localStorage.getItem('rugby-manager-theme')==='light'){
        document.body.classList.add('light-mode');
      }
    })();
  </script>
  <div id="home-screen"></div>
  <div id="pre-match"></div>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
