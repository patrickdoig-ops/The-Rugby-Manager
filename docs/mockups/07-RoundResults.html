<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>07 — Round Results (Polished)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Instrument+Serif:ital@1&family=JetBrains+Mono:wght@400;700&family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

#round-results {
  display: flex; flex-direction: column;
  min-height: 844px; background: var(--rm-bg);
}

#rr-topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 8px;
}
#rr-title {
  font-family: var(--rm-font-mono); font-size: 12px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase; color: var(--rm-chalk);
}
#rr-eyebrow {
  font-family: var(--rm-font-mono); font-size: 10px; letter-spacing: 0.14em;
  color: var(--rm-pitch); text-transform: uppercase; text-align: center;
  padding: 0 16px 14px;
}

#rr-list { flex: 1; padding: 0 16px; display: flex; flex-direction: column; gap: 10px; }

.rr-card {
  background: var(--rm-surface);
  border: 1px solid var(--rm-border-soft);
  border-radius: 12px; overflow: hidden;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.05),
    0 2px 8px rgba(0,0,0,0.45),
    0 6px 20px rgba(0,0,0,0.3);
}

.rr-card--me {
  border-color: color-mix(in oklch, var(--rm-pitch) 38%, transparent);
  background: color-mix(in oklch, var(--rm-pitch) 5%, var(--rm-surface));
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.07),
    0 2px 8px rgba(0,0,0,0.5),
    0 0 0 1px color-mix(in oklch, var(--rm-pitch) 18%, transparent),
    0 6px 24px color-mix(in oklch, var(--rm-pitch) 12%, transparent);
}

.rr-row-main {
  display: grid; grid-template-columns: 1fr auto 1fr;
  align-items: center; padding: 11px 14px 6px; gap: 6px;
}

.rr-team { display: flex; align-items: center; gap: 8px; min-width: 0; }
.rr-team--away { flex-direction: row-reverse; }

.rr-crest {
  width: 30px; height: 30px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--rm-font-display); font-size: 14px;
  color: rgba(255,255,255,0.93);
  position: relative; overflow: hidden; flex-shrink: 0;
}
.rr-crest::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, transparent 50%, rgba(0,0,0,0.2) 100%);
}
.rr-crest span { position: relative; z-index: 1; }

.rr-team-name {
  font-family: var(--rm-font-mono); font-size: 12px; font-weight: 700;
  letter-spacing: 0.08em; color: var(--rm-text); text-transform: uppercase;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.rr-card--me .rr-team-name { color: var(--rm-chalk); }

/* H = home venue pill */
.rr-venue-pill {
  font-family: var(--rm-font-mono); font-size: 7px; font-weight: 700;
  letter-spacing: 0.12em; padding: 1px 5px; border-radius: 4px;
  background: color-mix(in oklch, var(--rm-pitch) 14%, transparent);
  border: 1px solid color-mix(in oklch, var(--rm-pitch) 30%, transparent);
  color: var(--rm-pitch); flex-shrink: 0;
}

.rr-score {
  font-family: var(--rm-font-display); font-size: 24px;
  font-variant-numeric: tabular-nums; color: var(--rm-chalk);
  letter-spacing: 0.02em; white-space: nowrap; text-align: center;
}

/* Pending — pulsing */
.rr-pending {
  font-family: var(--rm-font-mono); font-size: 14px;
  color: var(--rm-text-dim); letter-spacing: 0.2em;
  text-align: center;
  animation: rmPulse 1.8s ease-in-out infinite;
}
@keyframes rmPulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* Score magnitude bar */
.rr-margin-bar { display: flex; height: 3px; }
.rr-margin-bar div { height: 100%; }

#rr-footer {
  padding: 16px 16px 32px;
  border-top: 1px solid var(--rm-border-soft);
  background: linear-gradient(180deg, transparent, color-mix(in oklch, var(--rm-bg-deep) 70%, transparent));
}

#rr-continue {
  width: 100%; padding: 15px;
  background: #007a2a; border: none; border-radius: 12px; color: #fff;
  font-family: var(--rm-font-body); font-size: 14px; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.22),
    0 6px 22px color-mix(in oklch, var(--rm-pitch) 30%, transparent),
    0 4px 12px rgba(0,0,0,0.4);
}
</style>
</head>
<body>
<div class="frame-label">
  <span class="frame-label-name">Round Results</span>
  <span class="frame-label-badge">v2 — Polished</span>
</div>

<div class="frame">
  <div id="round-results">
    <div id="rr-topbar">
      <div style="width:72px"></div>
      <span id="rr-title">Round 9 Results</span>
      <div style="width:72px"></div>
    </div>
    <div id="rr-eyebrow">2025/26 Season</div>

    <div id="rr-list">

      <!-- Player's match — pitch-green highlight -->
      <div class="rr-card rr-card--me">
        <div class="rr-row-main">
          <div class="rr-team">
            <div class="rr-crest" style="background:linear-gradient(160deg,#1B6EC2 0%,#0c3a7a 100%);box-shadow:0 0 10px color-mix(in oklch,#1B6EC2 35%,transparent)"><span>H</span></div>
            <span class="rr-team-name">HAR</span>
            <span class="rr-venue-pill">H</span>
          </div>
          <span class="rr-score">27 – 13</span>
          <div class="rr-team rr-team--away">
            <div class="rr-crest" style="background:linear-gradient(160deg,#006C4E 0%,#003828 100%);box-shadow:0 0 8px color-mix(in oklch,#006C4E 28%,transparent)"><span>N</span></div>
            <span class="rr-team-name">NOR</span>
          </div>
        </div>
        <div class="rr-margin-bar">
          <div style="width:68%;background:#1B6EC2"></div>
          <div style="flex:1;background:#006C4E;opacity:.45"></div>
        </div>
      </div>

      <!-- Close game — bars near even -->
      <div class="rr-card">
        <div class="rr-row-main">
          <div class="rr-team">
            <div class="rr-crest" style="background:linear-gradient(160deg,#D4001A 0%,#7a0010 100%);box-shadow:0 0 10px color-mix(in oklch,#D4001A 30%,transparent)"><span>E</span></div>
            <span class="rr-team-name">EXE</span>
            <span class="rr-venue-pill">H</span>
          </div>
          <span class="rr-score">22 – 20</span>
          <div class="rr-team rr-team--away">
            <div class="rr-crest" style="background:linear-gradient(160deg,#1a3a6b 0%,#0a1e3a 100%);box-shadow:0 0 8px color-mix(in oklch,#1a3a6b 25%,transparent)"><span>B</span></div>
            <span class="rr-team-name">BAT</span>
          </div>
        </div>
        <div class="rr-margin-bar">
          <div style="width:52%;background:#D4001A"></div>
          <div style="flex:1;background:#1a3a6b;opacity:.45"></div>
        </div>
      </div>

      <!-- Dominant win — wide bar -->
      <div class="rr-card">
        <div class="rr-row-main">
          <div class="rr-team">
            <div class="rr-crest" style="background:linear-gradient(160deg,#2a2a2a 0%,#0a0a0a 100%);border:1px solid rgba(255,255,255,0.12);box-shadow:0 0 6px rgba(255,255,255,0.06)"><span>S</span></div>
            <span class="rr-team-name">SAR</span>
            <span class="rr-venue-pill">H</span>
          </div>
          <span class="rr-score">44 – 7</span>
          <div class="rr-team rr-team--away">
            <div class="rr-crest" style="background:linear-gradient(160deg,#C73B1A 0%,#6e1a08 100%);box-shadow:0 0 8px color-mix(in oklch,#C73B1A 25%,transparent)"><span>B</span></div>
            <span class="rr-team-name">BRI</span>
          </div>
        </div>
        <div class="rr-margin-bar">
          <div style="width:86%;background:#444"></div>
          <div style="flex:1;background:#C73B1A;opacity:.4"></div>
        </div>
      </div>

      <!-- Pending — pulse animation -->
      <div class="rr-card">
        <div class="rr-row-main">
          <div class="rr-team">
            <div class="rr-crest" style="background:linear-gradient(160deg,#003087 0%,#001040 100%);box-shadow:0 0 8px color-mix(in oklch,#003087 28%,transparent)"><span>S</span></div>
            <span class="rr-team-name">SAL</span>
            <span class="rr-venue-pill">H</span>
          </div>
          <span class="rr-pending">···</span>
          <div class="rr-team rr-team--away">
            <div class="rr-crest" style="background:linear-gradient(160deg,#8B0000 0%,#3a0000 100%);box-shadow:0 0 6px color-mix(in oklch,#8B0000 22%,transparent)"><span>G</span></div>
            <span class="rr-team-name">GOS</span>
          </div>
        </div>
        <div class="rr-margin-bar">
          <div style="width:50%;background:var(--rm-surface-3)"></div>
          <div style="flex:1;background:var(--rm-surface-3)"></div>
        </div>
      </div>

      <!-- Away team win -->
      <div class="rr-card">
        <div class="rr-row-main">
          <div class="rr-team">
            <div class="rr-crest" style="background:linear-gradient(160deg,#5B2C8D 0%,#2a0f50 100%);box-shadow:0 0 8px color-mix(in oklch,#5B2C8D 28%,transparent)"><span>G</span></div>
            <span class="rr-team-name">GLO</span>
            <span class="rr-venue-pill">H</span>
          </div>
          <span class="rr-score">17 – 23</span>
          <div class="rr-team rr-team--away">
            <div class="rr-crest" style="background:linear-gradient(160deg,#B71C1C 0%,#6a0000 100%);box-shadow:0 0 8px color-mix(in oklch,#B71C1C 28%,transparent)"><span>L</span></div>
            <span class="rr-team-name">LEI</span>
          </div>
        </div>
        <div class="rr-margin-bar">
          <div style="width:43%;background:#5B2C8D;opacity:.5"></div>
          <div style="flex:1;background:#B71C1C"></div>
        </div>
      </div>

    </div>

    <div id="rr-footer">
      <button id="rr-continue">
        League Table
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" pointer-events="none"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </button>
    </div>
  </div>
</div>
</body>
</html>
