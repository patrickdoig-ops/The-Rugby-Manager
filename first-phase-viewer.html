<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>First Phase Viewer</title>
  <style>
    body { background-color: #0d1310; color: white; margin: 0; font-family: system-ui; }
    #header { padding: 10px 20px; background: #16201b; border-bottom: 1px solid #283430; display: flex; gap: 10px; align-items: center; }
    button { background: #3ee592; border: none; color: #000; padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; }
    select { background: #283430; color: white; border: 1px solid #4a5d52; padding: 6px; border-radius: 4px; }
    #pitch-container { display: flex; justify-content: center; padding: 20px; height: calc(100vh - 60px); box-sizing: border-box; }
    #pitch { aspect-ratio: 3/4; height: 100%; max-height: 800px; position: relative; }
  </style>
</head>
<body>
  <div id="header">
    <select id="play-select">
      <option value="crash_ball">Crash Ball</option>
      <option value="out_the_back">Out The Back</option>
    </select>
    <button id="btn-trigger">Trigger First Phase</button>
    <span id="status"></span>
  </div>
  
  <div id="pitch-container">
    <div id="pitch" class="pitch">
      <!-- PitchView will inject pitch markings and dots here -->
    </div>
  </div>

  <script type="module" src="/scripts/firstPhaseViewer.ts"></script>
</body>
</html>
