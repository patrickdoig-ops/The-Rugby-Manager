<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Rugby Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Geist:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <script>
    // Apply saved theme class before first paint to avoid flash
    (function(){
      if(localStorage.getItem('rugby-manager-theme')==='light'){
        document.body.classList.add('light-mode');
      }
    })();
  </script>
  <div id="home-screen"></div>
  <div id="settings"></div>
  <div id="team-selector"></div>
  <div id="team-info"></div>
  <div id="mode-picker"></div>
  <div id="hub"></div>
  <div id="fixture-list"></div>
  <div id="league-table"></div>
  <div id="league-menu"></div>
  <div id="team-stats"></div>
  <div id="player-stats"></div>
  <div id="player-profile"></div>
  <div id="pre-match"></div>
  <div id="app"></div>
  <div id="match-result"></div>
  <div id="round-results"></div>
  <div id="playoff-bracket"></div>
  <div id="budget-reveal"></div>
  <div id="takeover-reveal"></div>
  <div id="end-of-season"></div>
  <div id="renewals"></div>
  <div id="transfer-market"></div>
  <div id="retention-decision"></div>
  <div id="signing-results"></div>
  <div id="rollover"></div>
  <div id="contracts"></div>
  <div id="squad-management"></div>
  <div id="squad-overview"></div>
  <div id="training"></div>
  <div id="training-results"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
