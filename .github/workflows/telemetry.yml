name: Telemetry

# Runs the balance-tuning telemetry script (90-fixture double round-robin)
# and commits the markdown report to telemetry/latest.md on main. The file
# is browsable from the GitHub mobile app at:
#   github.com/<owner>/<repo>/blob/main/telemetry/latest.md
# Each run produces a new revision; `git log telemetry/latest.md`
# is the historical archive.
#
# Also writes the report to $GITHUB_STEP_SUMMARY so it renders inline on
# the Actions run page (handy if you want to view the result before it
# even commits).
#
# Trigger: workflow_dispatch only — fire manually from the Actions tab
# or the GitHub mobile app when you want a telemetry refresh.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: telemetry
  cancel-in-progress: false

jobs:
  telemetry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run telemetry
        run: npm run telemetry > /tmp/report.md

      - name: Compose final report with provenance header
        run: |
          mkdir -p telemetry
          VERSION=$(grep -oE "'[0-9]+\.[0-9]+[a-z]'" src/version.ts | tr -d "'")
          {
            echo "<!-- Auto-generated by .github/workflows/telemetry.yml — do not edit by hand. -->"
            echo
            echo "_Commit \`${GITHUB_SHA::7}\` · version ${VERSION} · generated $(date -u +%Y-%m-%dT%H:%M:%SZ)_"
            echo
            cat /tmp/report.md
          } > telemetry/latest.md

      - name: Publish report to run summary
        run: cat telemetry/latest.md >> "$GITHUB_STEP_SUMMARY"

      - name: Commit and push if changed
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add telemetry/latest.md telemetry/latest.json
          if git diff --staged --quiet; then
            echo "No telemetry changes — skipping commit."
          else
            git commit -m "telemetry: refresh latest.md and latest.json (${GITHUB_SHA::7})"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
