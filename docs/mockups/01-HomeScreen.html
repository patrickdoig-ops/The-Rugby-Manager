<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>01 — Home Screen (Polished)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Instrument+Serif:ital@1&family=JetBrains+Mono:wght@400;700&family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

#home-screen {
  position: relative; min-height: 844px;
  display: flex; flex-direction: column;
  background: var(--rm-bg-deep); overflow: hidden;
}

/* Rich atmospheric layered background */
#home-screen::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 90% 55% at 50% 22%,
      color-mix(in oklch, var(--rm-pitch) 22%, transparent) 0%,
      transparent 65%),
    radial-gradient(ellipse 100% 45% at 50% 100%,
      rgba(0,0,0,0.75) 0%, transparent 70%),
    repeating-linear-gradient(180deg,
      color-mix(in oklch, var(--rm-pitch-deep) 20%, var(--rm-bg-deep)) 0,
      color-mix(in oklch, var(--rm-pitch-deep) 20%, var(--rm-bg-deep)) 30px,
      color-mix(in oklch, var(--rm-pitch-deep) 28%, var(--rm-bg-deep)) 30px,
      color-mix(in oklch, var(--rm-pitch-deep) 28%, var(--rm-bg-deep)) 60px);
}

/* Landscape pitch-line SVG */
.home-pitch-lines {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none; opacity: 0.14;
}

#home-chrome {
  position: relative; z-index: 1;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px;
}

#home-status { display: flex; align-items: center; gap: 7px; }

.home-live-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--rm-pitch);
  box-shadow: 0 0 12px var(--rm-pitch);
  animation: pulse 1.8s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.home-status-text {
  font-family: var(--rm-font-mono); font-size: 10px;
  letter-spacing: 0.14em; color: var(--rm-text-dim); text-transform: uppercase;
}

.chrome-actions { display: flex; align-items: center; gap: 6px; }

.icon-btn {
  background: none; border: none; color: var(--rm-text-dim);
  cursor: pointer; padding: 7px; line-height: 0; border-radius: 9px;
}

#home-hero {
  position: relative; z-index: 1;
  flex: 1; display: flex; flex-direction: column;
  justify-content: center; padding: 0 28px 20px; gap: 14px;
}

.home-eyebrow {
  font-family: var(--rm-font-mono); font-size: 11px;
  letter-spacing: 0.20em; color: var(--rm-pitch); text-transform: uppercase;
}

#home-title {
  font-family: var(--rm-font-display);
  font-size: clamp(68px, 19vw, 92px);
  line-height: 0.84; color: var(--rm-chalk); letter-spacing: 0.01em;
  /* Very subtle chalk glow for depth */
  text-shadow: 0 0 80px color-mix(in oklch, var(--rm-pitch) 28%, transparent);
}

.home-version-badge {
  font-family: var(--rm-font-mono); font-size: 9px;
  letter-spacing: 0.14em; color: var(--rm-text-dim);
  background: color-mix(in oklch, var(--rm-surface) 80%, transparent);
  backdrop-filter: blur(8px);
  border: 1px solid var(--rm-border-soft);
  border-radius: 20px; padding: 3px 12px;
  display: inline-block;
}

#home-tagline {
  font-family: var(--rm-font-editor); font-style: italic;
  font-size: 19px; color: var(--rm-text-muted); line-height: 1.5;
}

/* ── CTAs ── */
#home-cta {
  position: relative; z-index: 1;
  padding: 0 20px 40px; display: flex; flex-direction: column; gap: 10px;
}

.home-btn {
  width: 100%; border: none; border-radius: 16px;
  cursor: pointer; font-family: var(--rm-font-display);
  letter-spacing: 0.04em; text-transform: uppercase;
  transition: background 0.15s;
}

/* Primary: Start New Game */
#start-game-btn {
  height: 64px; background: #007a2a; color: #fff; font-size: 26px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 22px;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.28),
    0 8px 32px color-mix(in oklch, var(--rm-pitch) 32%, transparent),
    0 4px 12px rgba(0,0,0,0.5);
  animation: ctaPulse 2.2s ease-in-out infinite;
}
@keyframes ctaPulse {
  0%,100% { box-shadow: inset 0 1px 0 rgba(255,255,255,0.28), 0 8px 28px color-mix(in oklch, var(--rm-pitch) 28%, transparent), 0 4px 12px rgba(0,0,0,0.5); }
  50%      { box-shadow: inset 0 1px 0 rgba(255,255,255,0.28), 0 8px 40px color-mix(in oklch, var(--rm-pitch) 55%, transparent), 0 4px 16px rgba(0,0,0,0.45); }
}

/* Secondary: Continue with save context */
#continue-game-btn {
  height: auto; min-height: 58px;
  padding: 12px 22px;
  background: color-mix(in oklch, var(--rm-surface) 75%, transparent);
  backdrop-filter: blur(12px);
  border: 1px solid var(--rm-border-soft);
  color: var(--rm-text-muted); font-size: 20px;
  display: flex; flex-direction: column;
  align-items: stretch; gap: 3px;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.05),
    0 2px 8px rgba(0,0,0,0.4);
}
.continue-btn-row {
  display: flex; align-items: center;
  justify-content: space-between; width: 100%;
}
.home-save-context {
  font-family: var(--rm-font-mono); font-size: 10px;
  letter-spacing: 0.12em; color: var(--rm-pitch);
  text-transform: uppercase; font-weight: 400;
}

/* ── Overwrite confirmation modal ── */
.confirm-modal-backdrop {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(8px) saturate(120%);
  display: flex; align-items: flex-end; justify-content: center;
  z-index: 50;
}
.confirm-modal {
  background: var(--rm-surface-2);
  border: 1px solid var(--rm-border-soft);
  border-radius: 20px 20px 0 0;
  padding: 24px 24px 36px; width: 100%;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.07),
    0 -8px 48px rgba(0,0,0,0.65);
  animation: sheetUp 0.22s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes sheetUp { from{transform:translateY(100%);opacity:0} to{transform:translateY(0);opacity:1} }

.confirm-title {
  font-family: var(--rm-font-display); font-size: 28px;
  text-transform: uppercase; color: var(--rm-chalk); margin-bottom: 8px;
}
.confirm-body {
  font-size: 13px; color: var(--rm-text-muted);
  margin-bottom: 22px; line-height: 1.55;
}
.confirm-actions { display: flex; gap: 10px; }
.confirm-btn {
  flex: 1; padding: 13px; border-radius: 12px;
  font-family: var(--rm-font-body); font-size: 13px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 7px;
}
.confirm-cancel {
  background: var(--rm-surface); border: 1px solid var(--rm-border-soft);
  color: var(--rm-text-muted);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
}
.confirm-proceed {
  background: #007a2a; border: none; color: #fff;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.22), 0 4px 16px color-mix(in oklch, var(--rm-pitch) 28%, transparent);
}
</style>
</head>
<body>
<div class="frame-label">
  <span class="frame-label-name">Home Screen</span>
  <span class="frame-label-badge">v2 — Polished</span>
</div>

<div class="frame">
  <div id="home-screen">

    <!-- Landscape pitch lines -->
    <svg class="home-pitch-lines" aria-hidden="true" viewBox="0 0 390 844" preserveAspectRatio="xMidYMid slice">
      <defs>
        <linearGradient id="lv" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="white" stop-opacity="0"/>
          <stop offset="45%" stop-color="white" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="white" stop-opacity="0"/>
        </linearGradient>
        <linearGradient id="lh" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="white" stop-opacity="0"/>
          <stop offset="50%" stop-color="white" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="white" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <line x1="195" y1="0" x2="195" y2="844" stroke="url(#lv)" stroke-width="0.8"/>
      <line x1="0" y1="211" x2="390" y2="211" stroke="url(#lh)" stroke-width="0.6"/>
      <line x1="0" y1="633" x2="390" y2="633" stroke="url(#lh)" stroke-width="0.6"/>
      <circle cx="195" cy="422" r="90" stroke="url(#lv)" stroke-width="0.8" fill="none"/>
      <line x1="0" y1="70"  x2="390" y2="70"  stroke="url(#lh)" stroke-width="0.5"/>
      <line x1="0" y1="774" x2="390" y2="774" stroke="url(#lh)" stroke-width="0.5"/>
    </svg>

    <div id="home-chrome">
      <div id="home-status">
        <span class="home-live-dot"></span>
        <span class="home-status-text">2025/26 Season</span>
      </div>
      <div class="chrome-actions">
        <button class="icon-btn" aria-label="Switch theme">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button class="icon-btn" aria-label="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </div>

    <div id="home-hero">
      <div class="home-eyebrow">&#9658;&nbsp; A Simulated Rugby Season</div>
      <h1 id="home-title">Rugby<br>Manager</h1>
      <span class="home-version-badge">v2.0.0</span>
      <p id="home-tagline">
        <strong>Build your squad. Call the shots.</strong><br>
        Every phase, every decision, every point.
      </p>
    </div>

    <div id="home-cta">
      <button class="home-btn" id="start-game-btn">
        <span>Start New Game</span>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" pointer-events="none"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </button>
      <button class="home-btn" id="continue-game-btn">
        <div class="continue-btn-row">
          <span>Continue</span>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" pointer-events="none"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </div>
        <span class="home-save-context">Harlequins &nbsp;·&nbsp; Wk 8 / 22 &nbsp;·&nbsp; 3rd &nbsp;·&nbsp; 28 pts</span>
      </button>
    </div>

    <!-- Overwrite confirmation modal (shown when Start is tapped with an existing save) -->
    <div class="confirm-modal-backdrop">
      <div class="confirm-modal">
        <div class="confirm-title">Start New Game?</div>
        <div class="confirm-body">This will permanently delete your save — Harlequins, Week 8, 3rd place. This cannot be undone.</div>
        <div class="confirm-actions">
          <button class="confirm-btn confirm-cancel">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" pointer-events="none"><path d="M18 6 6 18M6 6l12 12"/></svg>
            Cancel
          </button>
          <button class="confirm-btn confirm-proceed">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" pointer-events="none"><path d="m4.5 12.75 6 6 9-13.5"/></svg>
            New Game
          </button>
        </div>
      </div>
    </div>

  </div>
</div>
</body>
</html>
