<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>03 — Team Selector (Polished)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Instrument+Serif:ital@1&family=JetBrains+Mono:wght@400;700&family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

#team-selector {
  display: flex; flex-direction: column;
  min-height: 844px; background: var(--rm-bg);
}

#ts-back {
  display: flex; align-items: center; gap: 6px;
  background: none; border: none; color: var(--rm-text-muted);
  font-family: var(--rm-font-body); font-size: 13px; font-weight: 600;
  cursor: pointer; padding: 14px 16px 6px;
}

#ts-inner { flex: 1; overflow-y: auto; padding: 0 16px 32px; }

#ts-header { text-align: center; padding: 14px 0 22px; }
#ts-eyebrow {
  font-family: var(--rm-font-mono); font-size: 10px;
  letter-spacing: 0.20em; color: var(--rm-pitch);
  text-transform: uppercase; margin-bottom: 8px;
}
#ts-title {
  font-family: var(--rm-font-display); font-size: 34px;
  color: var(--rm-chalk); letter-spacing: 0.02em; margin-bottom: 6px;
}
#ts-subtitle {
  font-family: var(--rm-font-editor); font-style: italic;
  font-size: 15px; color: var(--rm-text-muted);
}

#ts-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
}

.ts-card {
  position: relative;
  background: var(--rm-surface);
  border: 1px solid var(--rm-border-soft);
  border-radius: 14px; overflow: hidden;
  /* Card elevation */
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.055),
    0 2px 8px rgba(0,0,0,0.5),
    0 8px 24px rgba(0,0,0,0.3);
  transition: box-shadow 0.14s, border-color 0.14s;
}

.ts-card:active {
  border-color: var(--rm-border);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.04),
    0 1px 4px rgba(0,0,0,0.5);
}

.ts-card-select {
  width: 100%; background: none; border: none;
  cursor: pointer; padding: 18px 14px 14px;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}

.ts-crest {
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--rm-font-display); font-size: 28px;
  color: rgba(255,255,255,0.95);
  position: relative; overflow: hidden; flex-shrink: 0;
}
.ts-crest::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.10) 0%, transparent 45%, rgba(0,0,0,0.22) 100%);
}
.ts-crest span { position: relative; z-index: 1; }

.ts-card-name {
  font-family: var(--rm-font-body); font-size: 12px; font-weight: 700;
  color: var(--rm-chalk); text-align: center; line-height: 1.3;
}

.ts-card-ovr {
  display: flex; align-items: baseline; gap: 5px;
}
.ts-card-ovr-label {
  font-family: var(--rm-font-mono); font-size: 8px;
  letter-spacing: 0.14em; color: var(--rm-text-dim); text-transform: uppercase;
}
/* IMPROVED: OVR value with heatmap colour + subtle glow on top tiers */
.ts-card-ovr-value {
  font-family: var(--rm-font-mono); font-size: 20px;
  font-weight: 700; font-variant-numeric: tabular-nums;
  line-height: 1;
}
.ovr-elite  { color: var(--rm-stat-3); text-shadow: 0 0 14px color-mix(in oklch, var(--rm-stat-3) 50%, transparent); }
.ovr-great  { color: var(--rm-stat-4); text-shadow: 0 0 10px color-mix(in oklch, var(--rm-stat-4) 35%, transparent); }
.ovr-good   { color: var(--rm-stat-5); }
.ovr-avg    { color: var(--rm-stat-2); }
.ovr-poor   { color: var(--rm-stat-1); }

/* IMPROVED: ⓘ button: 44×44 tap target */
.ts-card-info {
  position: absolute; top: 0; right: 0;
  width: 44px; height: 44px;
  background: none; border: none; cursor: pointer;
  color: var(--rm-text-dim);
  display: flex; align-items: flex-start; justify-content: flex-end;
  padding: 11px 11px 0 0;
  transition: color 0.12s;
}
.ts-card-info:active { color: var(--rm-text); }
</style>
</head>
<body>
<div class="frame-label">
  <span class="frame-label-name">Team Selector</span>
  <span class="frame-label-badge">v2 — Polished</span>
</div>

<div class="frame">
  <div id="team-selector">
    <button id="ts-back">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Lobby
    </button>

    <div id="ts-inner">
      <div id="ts-header">
        <div id="ts-eyebrow">2025/26 · New Manager</div>
        <h2 id="ts-title">Choose Your Team</h2>
        <p id="ts-subtitle">Select the side you want to manage</p>
      </div>

      <div id="ts-grid">

        <!-- Exeter — elite OVR (88) → gold glow -->
        <div class="ts-card">
          <button class="ts-card-info" aria-label="Team info">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
          </button>
          <button class="ts-card-select">
            <div class="ts-crest"
                 style="width:68px;height:68px;
                        background:linear-gradient(160deg,#D4001A 0%,#7a000e 100%);
                        box-shadow:0 0 20px color-mix(in oklch,#D4001A 40%,transparent),inset 0 1px 0 rgba(255,255,255,0.20)">
              <span>E</span>
            </div>
            <div class="ts-card-name">Exeter Chiefs</div>
            <div class="ts-card-ovr">
              <span class="ts-card-ovr-label">OVR</span>
              <span class="ts-card-ovr-value ovr-elite">88</span>
            </div>
          </button>
        </div>

        <!-- Harlequins — great OVR (83) → green glow -->
        <div class="ts-card">
          <button class="ts-card-info" aria-label="Team info">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
          </button>
          <button class="ts-card-select">
            <div class="ts-crest"
                 style="width:68px;height:68px;
                        background:linear-gradient(160deg,#1B6EC2 0%,#0c3a7a 100%);
                        box-shadow:0 0 20px color-mix(in oklch,#1B6EC2 40%,transparent),inset 0 1px 0 rgba(255,255,255,0.18)">
              <span>H</span>
            </div>
            <div class="ts-card-name">Harlequins</div>
            <div class="ts-card-ovr">
              <span class="ts-card-ovr-label">OVR</span>
              <span class="ts-card-ovr-value ovr-great">83</span>
            </div>
          </button>
        </div>

        <!-- Saracens — great OVR (82) → green -->
        <div class="ts-card">
          <button class="ts-card-info" aria-label="Team info">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
          </button>
          <button class="ts-card-select">
            <div class="ts-crest"
                 style="width:68px;height:68px;
                        background:linear-gradient(160deg,#2c2c2c 0%,#111 100%);
                        border:1.5px solid rgba(160,160,160,0.3);
                        box-shadow:0 0 14px rgba(150,150,150,0.25),inset 0 1px 0 rgba(255,255,255,0.12)">
              <span>S</span>
            </div>
            <div class="ts-card-name">Saracens</div>
            <div class="ts-card-ovr">
              <span class="ts-card-ovr-label">OVR</span>
              <span class="ts-card-ovr-value ovr-great">82</span>
            </div>
          </button>
        </div>

        <!-- Bath — good OVR (77) → cyan -->
        <div class="ts-card">
          <button class="ts-card-info" aria-label="Team info">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
          </button>
          <button class="ts-card-select">
            <div class="ts-crest"
                 style="width:68px;height:68px;
                        background:linear-gradient(160deg,#1a3a6b 0%,#0a1e40 100%);
                        box-shadow:0 0 14px color-mix(in oklch,#1a3a6b 35%,transparent),inset 0 1px 0 rgba(255,255,255,0.14)">
              <span>B</span>
            </div>
            <div class="ts-card-name">Bath Rugby</div>
            <div class="ts-card-ovr">
              <span class="ts-card-ovr-label">OVR</span>
              <span class="ts-card-ovr-value ovr-good">77</span>
            </div>
          </button>
        </div>

        <!-- Bristol — avg OVR (69) → amber -->
        <div class="ts-card">
          <button class="ts-card-info" aria-label="Team info">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
          </button>
          <button class="ts-card-select">
            <div class="ts-crest"
                 style="width:68px;height:68px;
                        background:linear-gradient(160deg,#C73B1A 0%,#6e1a08 100%);
                        box-shadow:0 0 14px color-mix(in oklch,#C73B1A 30%,transparent),inset 0 1px 0 rgba(255,255,255,0.15)">
              <span>B</span>
            </div>
            <div class="ts-card-name">Bristol Bears</div>
            <div class="ts-card-ovr">
              <span class="ts-card-ovr-label">OVR</span>
              <span class="ts-card-ovr-value ovr-avg">69</span>
            </div>
          </button>
        </div>

        <!-- Sale — poor OVR (61) → red -->
        <div class="ts-card">
          <button class="ts-card-info" aria-label="Team info">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
          </button>
          <button class="ts-card-select">
            <div class="ts-crest"
                 style="width:68px;height:68px;
                        background:linear-gradient(160deg,#003087 0%,#001040 100%);
                        box-shadow:0 0 12px color-mix(in oklch,#003087 30%,transparent),inset 0 1px 0 rgba(255,255,255,0.12)">
              <span>S</span>
            </div>
            <div class="ts-card-name">Sale Sharks</div>
            <div class="ts-card-ovr">
              <span class="ts-card-ovr-label">OVR</span>
              <span class="ts-card-ovr-value ovr-poor">61</span>
            </div>
          </button>
        </div>

      </div>
    </div>
  </div>
</div>
</body>
</html>
